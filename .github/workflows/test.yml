name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-repo
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: run tests
        env:
          GH_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
        run: go test -v -timeout 10m
